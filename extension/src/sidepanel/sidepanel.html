<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IChat Flow Context</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <div class="panel-shell">
      <header class="hero-card reveal">
        <div class="brand-row">
          <div>
            <p class="eyebrow">IChat Flow</p>
            <h1>网页上下文零摩擦投递</h1>
          </div>
          <div class="status-stack">
            <span id="captureStatus" class="status-pill">等待捕获</span>
            <span id="dispatchStatus" class="status-pill soft">等待发送</span>
          </div>
        </div>
        <p class="hero-copy">
          `Ctrl/Command + Shift + Y` 即可触发：先看划词，没有则按鼠标当前位置做智能 DOM 选区，并自动组装 Prompt。
        </p>
      </header>

      <section class="glass-card reveal">
        <div class="section-head">
          <h2>FlowContext</h2>
          <span id="triggerMode" class="mode-chip">未捕获</span>
        </div>
        <div class="meta-grid">
          <div class="meta-item wide">
            <span class="meta-label">来源页面</span>
            <strong id="pageTitle">等待捕获网页上下文</strong>
            <a id="pageUrl" class="page-link" href="#">尚未捕获 URL</a>
          </div>
          <div class="meta-item">
            <span class="meta-label">XPath</span>
            <code id="locatorValue">-</code>
          </div>
          <div class="meta-item">
            <span class="meta-label">捕获时间</span>
            <strong id="capturedAt">-</strong>
          </div>
        </div>
      </section>

      <section class="glass-card reveal" id="selectionCard">
        <div class="section-head">
          <h2>显式划词</h2>
          <span class="section-tag">方案 1</span>
        </div>
        <p id="selectionText" class="context-preview empty">还没有划词内容</p>
      </section>

      <section class="glass-card reveal">
        <div class="section-head">
          <h2>智能 DOM 片段</h2>
          <span class="section-tag accent">方案 2</span>
        </div>
        <p id="smartText" class="context-preview empty">还没有智能选区内容</p>
      </section>

      <section class="glass-card reveal">
        <div class="section-head">
          <h2>发送目标</h2>
          <span class="section-tag">Bonus 1</span>
        </div>
        <div class="controls-row">
          <div class="segmented-control" id="providerToggle">
            <button type="button" class="segmented is-active" data-provider="chatgpt">ChatGPT</button>
            <button type="button" class="segmented" data-provider="gemini">Gemini</button>
          </div>
          <button type="button" id="autoSendToggle" class="toggle-chip on">自动发送已开</button>
        </div>
      </section>

      <section class="glass-card reveal prompt-card">
        <div class="section-head">
          <h2>Prompt Draft</h2>
          <span class="section-tag">自动组装</span>
        </div>
        <textarea id="promptDraft" spellcheck="false" placeholder="捕获完成后，这里会自动生成 Prompt。"></textarea>
      </section>

      <footer class="action-row reveal">
        <button type="button" id="recaptureButton" class="primary-action">重新捕获</button>
        <button type="button" id="dispatchButton" class="secondary-action">再次发送</button>
      </footer>
    </div>

    <script src="../shared/prompt-builder.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
